name: CI

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]

jobs:
  quality:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Typecheck · Test · Build
        run: |
          if [ ! -f package.json ]; then
            echo "sem package.json — repo esqueleto, nada a verificar"
            exit 0
          fi
          bun install --frozen-lockfile || bun install
          bunx tsc --noEmit
          if grep -q '"test"' package.json; then bun run test; else echo "sem script de teste — adicione um!"; fi
          bun run build

  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
