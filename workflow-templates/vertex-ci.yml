name: CI

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]

jobs:
  quality:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Typecheck · Test · Build
        run: |
          if [ ! -f package.json ]; then
            echo "sem package.json — repo esqueleto, nada a verificar"
            exit 0
          fi
          bun install --frozen-lockfile || bun install
          bunx tsc --noEmit
          if grep -q '"test"' package.json; then bun run test; else echo "sem script de teste — adicione um!"; fi
          bun run build

  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # binário direto (MIT) — a gitleaks-action exige licença paga para orgs
      - name: Gitleaks scan
        run: |
          VER=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oE '"tag_name": *"v[^"]+"' | grep -oE '[0-9][^"]*')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact -v
